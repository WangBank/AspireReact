services:
  postgres:
    image: ${POSTGRES_IMAGE:-postgres:latest}
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-lies}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres123}
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-lies}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "127.0.0.1:${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  lies-app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      ASPNETCORE_URLS: http://+:8080
      DOTNET_ENVIRONMENT: Production
      ConnectionStrings__PostgreSQL: Host=postgres;Port=5432;Database=${POSTGRES_DB:-lies};Username=${POSTGRES_USER:-postgres};Password=${POSTGRES_PASSWORD:-postgres123}
      Redis__ConnectionString: redis:6379
      Jwt__Secret: ${JWT_SECRET:-8Zk9pQ2sX7gR5tU4jB6vN2mD8aF1cH3kL0zP5qW7eS2dF9gH4jK6lA8}
      Jwt__Issuer: ${JWT_ISSUER:-Lies.Server}
      Jwt__Audience: ${JWT_AUDIENCE:-Lies.Client}
      OTEL_EXPORTER_OTLP_ENDPOINT: http://lies-apphost-monitor:18889
      OTEL_EXPORTER_OTLP_PROTOCOL: grpc
      RapidOcr__ModelsDirectory: /app/RuntimeData/RapidOcr
      RapidOcr__FontPath: /usr/share/fonts/opentype/noto/NotoSansCJK-Regular.ttc
      RapidOcr__AutoDownloadModels: ${RAPIDOCR_AUTO_DOWNLOAD_MODELS:-true}
    ports:
      - "${APP_PORT:-5516}:8080"
    volumes:
      - app_logs:/app/Logs
      - app_runtime:/app/RuntimeData

  lies-apphost-monitor:
    build:
      context: .
      dockerfile: Dockerfile
      target: apphost-monitor
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      ASPNETCORE_URLS: http://0.0.0.0:17100
      DOTNET_ENVIRONMENT: Production
      LIES_APPHOST_MONITOR_MODE: "true"
      ASPIRE_ALLOW_UNSECURED_TRANSPORT: "true"
      ASPIRE_DASHBOARD_UNSECURED_ALLOW_ANONYMOUS: "true"
      ASPIRE_DASHBOARD_OTLP_ENDPOINT_URL: http://0.0.0.0:18889
      DOTNET_RESOURCE_SERVICE_ENDPOINT_URL: http://127.0.0.1:20252
      Monitoring__PostgresConnectionString: Host=postgres;Port=5432;Database=${POSTGRES_DB:-lies};Username=${POSTGRES_USER:-postgres};Password=${POSTGRES_PASSWORD:-postgres123}
      Monitoring__RedisConnectionString: redis:6379
      ConnectionStrings__PostgreSQL: Host=postgres;Port=5432;Database=${POSTGRES_DB:-lies};Username=${POSTGRES_USER:-postgres};Password=${POSTGRES_PASSWORD:-postgres123}
      ConnectionStrings__Redis: redis:6379
      Monitoring__ServerUrl: http://lies-app:8080
      Monitoring__FrontendUrl: http://lies-app:8080
      Monitoring__PostgresUrl: http://postgres:5432
      Monitoring__RedisUrl: http://redis:6379
    ports:
      - "${ASPIRE_DASHBOARD_BIND_HOST:-127.0.0.1}:${ASPIRE_DASHBOARD_PORT:-18888}:17100"

volumes:
  postgres_data:
  redis_data:
  app_logs:
  app_runtime:
