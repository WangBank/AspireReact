services:
  dashboard:
    image: ${ASPIRE_DASHBOARD_IMAGE:-mcr.microsoft.com/dotnet/aspire-dashboard:latest}
    restart: unless-stopped
    environment:
      DASHBOARD__FRONTEND__AUTHMODE: BrowserToken
      DASHBOARD__FRONTEND__BROWSERTOKEN: ${ASPIRE_DASHBOARD_FRONTEND_TOKEN:-lies-dashboard-local}
      DASHBOARD__OTLP__AUTHMODE: Unsecured
      DASHBOARD__OTLP__SUPPRESSUNSECUREDMESSAGE: "true"
    ports:
      - "${ASPIRE_DASHBOARD_BIND_HOST:-127.0.0.1}:${ASPIRE_DASHBOARD_PORT:-18888}:18888"

  postgres:
    image: ${POSTGRES_IMAGE:-postgres:latest}
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-lies}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres123}
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-lies}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "127.0.0.1:${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      dashboard:
        condition: service_started
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      ASPNETCORE_URLS: http://+:8080
      DOTNET_ENVIRONMENT: Production
      ConnectionStrings__PostgreSQL: Host=postgres;Port=5432;Database=${POSTGRES_DB:-lies};Username=${POSTGRES_USER:-postgres};Password=${POSTGRES_PASSWORD:-postgres123}
      Redis__ConnectionString: redis:6379
      Jwt__Secret: ${JWT_SECRET:-8Zk9pQ2sX7gR5tU4jB6vN2mD8aF1cH3kL0zP5qW7eS2dF9gH4jK6lA8}
      Jwt__Issuer: ${JWT_ISSUER:-Lies.Server}
      Jwt__Audience: ${JWT_AUDIENCE:-Lies.Client}
      OTEL_EXPORTER_OTLP_ENDPOINT: http://dashboard:18889
      OTEL_EXPORTER_OTLP_PROTOCOL: grpc
      RapidOcr__ModelsDirectory: /app/RuntimeData/RapidOcr
      RapidOcr__FontPath: /usr/share/fonts/opentype/noto/NotoSansCJK-Regular.ttc
      RapidOcr__AutoDownloadModels: ${RAPIDOCR_AUTO_DOWNLOAD_MODELS:-true}
    ports:
      - "${APP_PORT:-5516}:8080"
    volumes:
      - app_logs:/app/Logs
      - app_runtime:/app/RuntimeData

volumes:
  postgres_data:
  redis_data:
  app_logs:
  app_runtime:
